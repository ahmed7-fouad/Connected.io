<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./src/all.min.css">
    <link rel="stylesheet" href="./src/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connected</title>
  </head>

  <body class="bg-primary relative">

    <!-- Rounded Background Circles Effect -->
    <div class="fixed inset-0 z-[-1] overflow-hidden">
      <section class="top-[-10%] right-[-5%] size-[35rem] rounded-full bg-[#64ffda] opacity-20 blur-[130px] "></section>
      <section class="absolute bottom-[-10%] right-[-5%] w-[30rem] h-[30rem] rounded-full bg-[#00d2ff] opacity-15 blur-[120px]"></section>
    </div>

    <!-- Error Banner -->
    <section id="errorBanner" class=" z-1000 w-md h-40 bg-btncolor fixed  top-5 right-5 -translate-y-1000 transition-transform duration-300 rounded-xl flex items-center justify-center border-2 text-red-500 border-red-500 after:content-[''] after:bg-red-500 after:rounded-full after:size-6 after:absolute  after:left-0 after:top-0 after:-translate-y-3 after:-translate-x-3 after:animate-pulse">
      <h4 class="text-center font-bold capitalize text-md">Error</h4>
      <section class="overflow-hidden  h-1 w-full absolute bottom-0 left-0 rounded-bl-xl rounded-br-xl">
          <span id="progressBar" class="block h-full w-0 bg-red-500"></span>
      </section>
    </section>

    <!-- RegisterForm -->
     <section id="registerForm" class="w-screen h-screen bg-gray-900/50 fixed top-0
      left-0 z-600 p-6 flex justify-center items-start invisible opacity-0 transition-[opacity] duration-300 ">
        <form action="" class="bg-paragraph w-lg p-6 rounded-lg space-y-3" name="RegisterForm">
          <h3 class="capitalize text-lg font-semibold tracking-wide">register</h3>
          <hr class="border-mutedpar">
          <p class="capitalize font-medium">profile image</p>
            <section class="imageContainer rounded-lg overflow-hidden h-11 border-[0.5px] border-mutedpar">
              <input class="bg-gray-100  w-full h-full border-0" type="file" title="profile_Image">
            </section>
            <section class="h-11 border-[0.5px] border-mutedpar">
              <input class="w-full h-full rounded-lg border-0" type="text" placeholder="Enter Your Name">
            </section>
            <section class="h-11 flex rounded-lg overflow-hidden border-[0.5px] border-mutedpar">
              <span class="bg-mutedpar  size-11 flex items-center justify-center text-paragraph font-semibold">@</span>
              <input class="h-full flex-1 border-0" type="email" placeholder="Enter Your Email">
            </section>
            <section class="rounded-lg overflow-hidden h-11 border-[0.5px] border-mutedpar">
              <input class="w-full h-full border-0" type="password" placeholder="Enter Your Password">
            </section>
            <hr class="mt-5 mb-9 border-mutedpar">
            <section class="btns flex justify-end gap-2">
              <button id="closeRegisterFormBtn" type="button" class="btn-style bg-gray-500 hover:bg-gray-600 text-white">close</button>
              <button id="mainRegisterBtn" type="button" class="btn-style">register</button>
            </section>
        </form>
     </section>
    <!--// RegisterForm //-->

    <!-- loginForm -->
     <section id="loginForm" class="w-screen h-screen  bg-gray-900/50 fixed top-0
      left-0 z-600 p-6 flex justify-center items-start  invisible opacity-0 transition-[opacity] duration-300 ">
        <form action="" class="bg-paragraph w-lg p-6 rounded-lg space-y-3" name="LoginForm">
          <h3 class="capitalize text-lg font-semibold tracking-wide">login</h3>
          <hr class="border-mutedpar">
            <section class="h-11 flex rounded-lg overflow-hidden border-[0.5px] border-mutedpar">
              <input class="h-full flex-1 border-0" type="text" placeholder="Enter Your username">
            </section>
            <section class="rounded-lg overflow-hidden h-11 border-[0.5px] border-mutedpar">
              <input class="w-full h-full border-0" type="password" placeholder="Enter Your Password">
            </section>
            <hr class="mt-5 mb-9 border-mutedpar">
            <section class="btns flex justify-end gap-2">
              <button id="closeLoginFormBtn" type="button" class="btn-style bg-gray-500 hover:bg-gray-600 text-white">close</button>
              <button id="mainLoginBtn" type="button" class="btn-style">login</button>
            </section>
        </form>
     </section>
    <!--// loginForm //-->


        <!-- header -->
        <header class="">
            <!-- nav -->
            <nav class="sticky top-0 z-400">
              <section class="main-container bg-card py-3 flex justify-between rounded-b-sm shadow-2xl flex-wrap">
                <!-- Nav left side content -->
                <section class="flex items-center gap-5">
                    <section class="logo">
                      <a href="index.html" class="capitalize text-primary font-bold text-2xl tracking-normal">connected.io</a>
                    </section>
                      <ul class="links flex items-center gap-3">
                        <a href="index.html" class="capitalize font-medium text-base hover:text-primary transition-[color] duration-200"><li>home</li></a>
                        <a href="profile.html" class="profileLink capitalize font-medium text-base hover:text-primary transition-[color] duration-200 hidden md:block"><li>profile</li></a>
                      </ul>
                </section>
                  <!-- Nav Right Side Content -->
                  <!-- Register And SignIn Buttons -->
                   <section class="flex items-center">

                    <!-- Valid Authentication Elements -->
                    <section class="hidden cursor-pointer" id="AuthenticatedElements">
                      <a href="profile.html" class="profileLink profileImageData flex items-center gap-2">
                        <section class="profileImage size-9 bg-white rounded-full
                        flex items-center justify-center overflow-hidden">
                        <img class="w-100 h-100" src="" alt="">
                      </section>
                      <span class=""></span>
                    </a>
                    <button class="btn-style bg-red-500 text-white hover:bg-red-600 inline-block ml-2 p-2 md:px-4" id="logoutBtn">logout</button>
                  </section> 
                  <!--// Valid Authentication Elements //-->
                  
                    <!-- Non Valid Authentication Elements -->
                    <section class="space-x-2 hidden content-appearance" id="unAuthenticatedElements">
                      <button class="btn-style p-2 md:px-4" id="loginBtn">login</button>
                      <button class="btn-style p-2 md:px-4" id="registerBtn">register</button>
                    </section>
                    <!--// Non Valid Authentication Elements //-->
                   </section>

              </section>
            </nav>
            
            <!--// nav //-->

            

            <!-- Cards Content -->
             <section id="postDetails" class="main-container py-7 space-y-10">

                <!-- Post Auther Data -->
                     <h1 id="postAuthor"class="text-3xl text-paragraph capitalize font-bold tracking-wider">username</h1>
                <!-- //Post Auther Data //-->


                  <!-- ===== Card===== -->
                    <section id="postsContainer"class="card bg-paragraph rounded-sm">
                            <!-- Card Header -->
                       <section  class="card bg-paragraph p-4 rounded-sm shadow-[0_10px_35px_-12px_rgba(100,255,218,0.25)]">
                              <header class="flex items-center gap-3 border-b-2 pb-3 border-black/20 mb-4">
                                  <section class="userImage size-10 rounded-full bg-red-500 overflow-hidden border-1 border-primary">
                                  <img class="widt-full h-full "src="images/img9.jpg" alt="">
                                  </section>
                                  <p class="userName font-semibold text-lg">userName</p>
                              </header>
                              <!-- Card Image -->
                              <section class="overflow-hidden rounded-lg">
                                  <img src="images/img11.jpg" alt="card-img">
                              </section>
                              <!-- Releasing Time -->
                              <span class="relasing-time capitalize text-paragraph mt-2">2 min ago</span>
                              <!-- Card Content -->
                              <section class="space-y-2">
                                  <h2 class="card-heading text-2xl capitalize font-semibold">special title treatment</h2>
                                  <p class="card-paragraph font-light">with supporting text below as a natural lead in additional content</p>
                              </section>
                              <!-- Comment Part -->
                                  <hr class="my-4 opacity-20">
                                  <p class="capitalize cursor-pointer"><i class="fa-regular fa-comment"></i><span class="comments-number mx-1">(3)</span>comments</p>
                                  <section id="commentsSec" class="mt-3 space-y-3">
                                      <section class="space-y-3">
                                          <section class="flex items-center gap-3">
                                              <img class="rounded-full size-11" src="images/img3.jpg" alt="">
                                              <p class="capitalize font-bold">title</p>
                                          </section>
                                          <p class="text-paragraph font-medium">body</p>
                                      </section>
                                  </section>
                          <section id="commentsSec" class="mt-3 space-y-3">
                            
                         </section>
                          <section id="NewCommentSec" class="flex items-center  overflow-hidden rounded-xl border-2 border-mutedpar mt-5 ">
                              <input id="newCommentTextField" type="text" placeholder="Type Your Comment" class="flex-1 border-none placeholder:text-mutedpar">
                              <button id="createNewCommentBtn" type="button" class="btn-style border-0 rounded-tl-none rounded-none">create</button>
                          </section>
                  
                  </section>
                    <!--// ===== Card===== //-->

             </section>
          <!--// Cards Content //-->
        </header>



    <script src="./node_modules/flowbite/dist/flowbite.min.js"></script>
    <script src="./node_modules/axios/dist/axios.min.js"></script>
    <script src="./src/mainFunctions.js"></script>
    <script src="./src/page.js"></script>
  </body>
</html>
